image: ubuntu/24.04

secrets:
  - b88a4c2c-944c-42a6-9fbb-7483049c458a


packages:
  # Build tools
  - software-properties-common
  - build-essential
  # Python is 3.12
  - python3-dev
  - python3-pip
  # Extra
  - nodejs
  # Playwright's chromium system deps (libnss3, libgtk-3, fonts, etc.) are
  # installed by `playwright install --with-deps chromium` in the test step
  # below — keeping that list out of here avoids drift on every Playwright bump.

tasks:
  - setup: |
      echo "Building on Ubuntu 2404"
      sudo pip install --break-system-packages -U uv nox
      cd terminux
      uv sync
  - test: |
      cd terminux
      # Chromium only — the e2e suite never touches firefox/webkit — and
      # `--with-deps` lets playwright apt-install exactly what it needs.
      uv run playwright install --with-deps chromium
      uv run pytest -q --tb=short
  - lint: |
      cd terminux
      uv run ruff check
      # uv run ty check src
  - nox: |
      cd terminux
      uvx nox

