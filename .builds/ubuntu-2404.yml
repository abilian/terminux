image: ubuntu/24.04

secrets:
  - b88a4c2c-944c-42a6-9fbb-7483049c458a


packages:
  # Build tools
  - software-properties-common
  - build-essential
  # Python is 3.12
  - python3-dev
  - python3-pip
  # Extra
  - nodejs
  # For playwright
  - libxcb-shm0
  - libx11-xcb1
  - libxrandr2
  - libxcomposite1
  - libxcursor1
  - libxdamage1
  - libxi6
  - libxfixes3
  - libgtk-3-0t64
  - libpangocairo-1.0-0
  - libpango-1.0-0
  - libatk1.0-0t64
  - libcairo-gobject2
  - libcairo2
  - libgdk-pixbuf-2.0-0
  - libxrender1
  - libasound2t64

tasks:
  - setup: |
      echo "Building on Ubuntu 2404"
      sudo pip install --break-system-packages -U uv nox
      cd terminux
      uv sync
  - test: |
      cd terminux
      uv run playwright install
      uv run pytest -q --tb=short
  - lint: |
      cd terminux
      uv run ruff check
      # uv run ty check src
  - nox: |
      cd terminux
      uvx nox

